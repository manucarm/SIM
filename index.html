<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gorillas DOS</title>
    <script src="https://js-dos.com/v7/build/releases/latest/js-dos.js"></script>
    <link href="https://js-dos.com/v7/build/releases/latest/js-dos.css" rel="stylesheet">
    <style>
        html, body, #jsdos { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; }
    </style>
</head>
<body>
    <div id="jsdos"></div>
    <script>
        window.onload = function() {
            // Configuramos el emulador con opciones de compatibilidad
            const ci = Dos(document.getElementById("jsdos"), {
                style: "hidden", // Oculta botones extra para que se vea limpio
                noSideBar: true,
                noCenter: false
            });

            // Lanzamos el juego
            ci.run("gorillas.jsdos").then((runtime) => {
                console.log("¡Juego cargado con éxito!");
            }).catch((err) => {
                console.error("Error al arrancar el juego:", err);
            });
        };
    </script>
</body>
</html>
