<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modo Emergencia Gorillas</title>
    <script src="https://js-dos.com/v7/build/releases/latest/js-dos.js"></script>
    <link href="https://js-dos.com/v7/build/releases/latest/js-dos.css" rel="stylesheet">
    <style>
        html, body, #jsdos { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; }
    </style>
</head>
<body>
    <div id="jsdos"></div>
    <script>
        window.onload = function() {
            if (typeof Dos !== "undefined") {
                // Iniciamos el emulador
                Dos(document.getElementById("jsdos"), {
                    style: "hidden"
                }).run("gorillas.jsdos").then((runtime) => {
                    // ESTO ES LO IMPORTANTE: Fuerza a abrir la consola de comandos
                    console.log("Forzando terminal...");
                    runtime.main(["-c", "dir"]); 
                }).catch((err) => {
                    alert("El archivo gorillas.jsdos no se encuentra o está dañado.");
                });
            }
        };
    </script>
</body>
</html>
